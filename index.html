    <!-- 本地脚本 -->
    <script>
        // 动态加载搜索相关脚本
        function loadScript(src) {
            const script = document.createElement('script');
            script.src = src;
            script.onload = function() {
                console.log('✅ 脚本加载成功:', src);
            };
            script.onerror = function() {
                console.error('❌ 脚本加载失败:', src);
            };
            document.head.appendChild(script);
        }
        
        // 加载搜索相关脚本
        loadScript('scripts/search.js');
        loadScript('scripts/search-functions.js');
        loadScript('scripts/search-ui.js');
        
        // 等待脚本加载完成后再初始化
        setTimeout(() => {
            if (typeof EmotionSearch !== 'undefined') {
                console.log('✅ 搜索引擎已加载');
                initializeSearch();
            }
        }, 1000);
        
        function initializeSearch() {
            const searchIndexUrl = 'data/search-index.json';
            
            fetch(searchIndexUrl)
                .then(response => response.json())
                .then(data => {
                    window.emotionSearchIndex = data;
                    console.log('✅ 搜索索引加载成功，条目:', data.length);
                    
                    // 添加键盘事件监听
                    const searchInput = document.getElementById('searchInput');
                    if (searchInput) {
                        searchInput.addEventListener('keypress', (e) => {
                            if (e.key === 'Enter') {
                                performSearch();
                            }
                        });
                    }
                })
                .catch(error => {
                    console.error('❌ 搜索索引加载失败:', error);
                });
        }
    </script>
